<!DOCTYPE html>
<html>
<head>
    <title>My To Do List</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container mt-5">

<h1 class="text-center">My To Do List</h1>

<div class="text-center mb-4">
    <img src="todo.avif" width="150">
</div>

<form id="taskForm">

<label>Task Title</label>
<input type="text" id="taskTitle" class="form-control">

<br>

<label>Priority</label>
<select id="taskPriority" class="form-control">
<option value="Low">Low</option>
<option value="Medium">Medium</option>
<option value="High">High</option>
</select>

<br>

<label>Status</label><br>
<input type="radio" name="taskStatus" value="Pending" checked> Pending
<input type="radio" name="taskStatus" value="Completed"> Completed

<br><br>

<button type="submit" class="btn btn-primary">Add Task</button>

</form>

<hr>

<h3>Upcoming Tasks...</h3>

<ul id="taskList"></ul>

</div>

<script src="script.js"></script>

</body>
</html>
